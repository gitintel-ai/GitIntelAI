name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write

jobs:
  # ════════════════════════════════════════════════════════════════
  # CLI Release (Multi-platform)
  # ════════════════════════════════════════════════════════════════
  release-cli:
    name: Release CLI
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: gitintel-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: gitintel-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: gitintel-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gitintel-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gitintel-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'linux')
        run: sudo apt-get update && sudo apt-get install -y musl-tools perl make

      - name: Install cross (for ARM64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cd packages/cli && cargo build --release --target ${{ matrix.target }}

      - name: Build (cross-compile ARM64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cd packages/cli && cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv packages/cli/target/${{ matrix.target }}/release/gitintel.exe ${{ matrix.artifact }}
          else
            mv packages/cli/target/${{ matrix.target }}/release/gitintel ${{ matrix.artifact }}
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

  # ════════════════════════════════════════════════════════════════
  # npm CLI package (@gitintel/cli)
  # ════════════════════════════════════════════════════════════════
  publish-npm-cli:
    name: Publish npm CLI
    runs-on: ubuntu-latest
    needs: [release-cli]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version from git tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd packages/cli-npm
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish
        run: cd packages/cli-npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ════════════════════════════════════════════════════════════════
  # Docker Images
  # ════════════════════════════════════════════════════════════════
  docker-push:
    name: Push Docker Images
    runs-on: ubuntu-latest
    needs: [release-cli]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/server:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/server:latest

      - name: Build and push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.dashboard
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/dashboard:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/dashboard:latest

      - name: Build and push CLI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.cli
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/cli:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/cli:latest

  # ════════════════════════════════════════════════════════════════
  # Create Release Notes
  # ════════════════════════════════════════════════════════════════
  release-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    needs: [release-cli, docker-push]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Update release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
