<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 520">
  <style>
    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { 50% { opacity: 0 } }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    .terminal { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .prompt { fill: #7ec699; }
    .cmd { fill: #e6e6e6; }
    .output { fill: #b0b0b0; }
    .highlight { fill: #61afef; }
    .ai-tag { fill: #e06c75; font-weight: bold; }
    .hu-tag { fill: #98c379; font-weight: bold; }
    .stat { fill: #e5c07b; }
    .pct { fill: #c678dd; font-weight: bold; }
    .dim { fill: #636d83; }
    .bar-filled { fill: #61afef; }
    .bar-empty { fill: #3e4451; }
    .line1 { animation: fadeIn 0.3s ease-in 0.5s both; }
    .line2 { animation: fadeIn 0.3s ease-in 0.8s both; }
    .line3 { animation: fadeIn 0.3s ease-in 1.0s both; }
    .line4 { animation: fadeIn 0.3s ease-in 1.2s both; }
    .line5 { animation: fadeIn 0.3s ease-in 1.4s both; }
    .line6 { animation: fadeIn 0.3s ease-in 1.6s both; }
    .line7 { animation: fadeIn 0.3s ease-in 1.8s both; }
    .line8 { animation: fadeIn 0.3s ease-in 2.0s both; }
    .line9 { animation: fadeIn 0.3s ease-in 2.3s both; }
    .line10 { animation: fadeIn 0.3s ease-in 2.5s both; }
    .line11 { animation: fadeIn 0.3s ease-in 2.7s both; }
    .line12 { animation: fadeIn 0.3s ease-in 2.9s both; }
    .line13 { animation: fadeIn 0.3s ease-in 3.1s both; }
    .line14 { animation: fadeIn 0.3s ease-in 3.3s both; }
    .line15 { animation: fadeIn 0.3s ease-in 3.5s both; }
    .line16 { animation: fadeIn 0.3s ease-in 3.8s both; }
    .line17 { animation: fadeIn 0.3s ease-in 4.0s both; }
    .line18 { animation: fadeIn 0.3s ease-in 4.2s both; }
    .line19 { animation: fadeIn 0.3s ease-in 4.4s both; }
    .line20 { animation: fadeIn 0.3s ease-in 4.6s both; }
    .line21 { animation: fadeIn 0.3s ease-in 4.8s both; }
    .line22 { animation: fadeIn 0.3s ease-in 5.0s both; }
    .line23 { animation: fadeIn 0.3s ease-in 5.2s both; }
  </style>

  <!-- Terminal window -->
  <rect width="840" height="520" rx="8" fill="#282c34"/>

  <!-- Title bar -->
  <rect width="840" height="32" rx="8" fill="#21252b"/>
  <rect y="24" width="840" height="8" fill="#21252b"/>
  <circle cx="20" cy="16" r="6" fill="#e06c75"/>
  <circle cx="40" cy="16" r="6" fill="#e5c07b"/>
  <circle cx="60" cy="16" r="6" fill="#98c379"/>
  <text x="420" y="20" text-anchor="middle" class="terminal dim" font-size="12">gitintel — demo</text>

  <g class="terminal" transform="translate(20, 52)">
    <!-- gitintel scan -->
    <g class="line1">
      <text y="0"><tspan class="prompt">$</tspan><tspan class="cmd"> gitintel scan</tspan></text>
    </g>
    <g class="line2">
      <text y="20" class="output">GitIntel Scan Results</text>
    </g>
    <g class="line3">
      <text y="36" class="dim">────────────────────────────────────────────────</text>
    </g>
    <g class="line4">
      <text y="52"><tspan class="output">Commits scanned:     </tspan><tspan class="stat">312</tspan></text>
    </g>
    <g class="line5">
      <text y="68"><tspan class="output">AI-assisted commits: </tspan><tspan class="pct">127 (40.7%)</tspan></text>
    </g>
    <g class="line6">
      <text y="88"><tspan class="output">Agent                Commits</tspan></text>
    </g>
    <g class="line7">
      <text y="104"><tspan class="highlight">Claude Code          </tspan><tspan class="stat">89 (28.5%)</tspan></text>
    </g>
    <g class="line8">
      <text y="120"><tspan class="highlight">Cursor               </tspan><tspan class="stat">24 (7.7%)</tspan></text>
    </g>
    <g class="line9">
      <text y="136"><tspan class="highlight">GitHub Copilot       </tspan><tspan class="stat">14 (4.5%)</tspan></text>
    </g>

    <!-- gitintel blame -->
    <g class="line10">
      <text y="168"><tspan class="prompt">$</tspan><tspan class="cmd"> gitintel blame src/auth.ts</tspan></text>
    </g>
    <g class="line11">
      <text y="188" class="output">AI Blame: src/auth.ts (12 lines)</text>
    </g>
    <g class="line12">
      <text y="204" class="dim">────────────────────────────────────────────────────────────</text>
    </g>
    <g class="line13">
      <text y="220"><tspan class="ai-tag">[AI] </tspan><tspan class="dim">dc69ba8</tspan><tspan class="output">  export async function authenticate(token: string) {</tspan></text>
    </g>
    <g class="line14">
      <text y="236"><tspan class="ai-tag">[AI] </tspan><tspan class="dim">dc69ba8</tspan><tspan class="output">    const decoded = jwt.verify(token, SECRET);</tspan></text>
    </g>
    <g class="line15">
      <text y="252"><tspan class="ai-tag">[AI] </tspan><tspan class="dim">dc69ba8</tspan><tspan class="output">    return await db.users.findById(decoded.sub);</tspan></text>
    </g>
    <g class="line16">
      <text y="268"><tspan class="hu-tag">[HU] </tspan><tspan class="dim">a3f1c02</tspan><tspan class="output">  // Rate limit: max 100 auth attempts per minute</tspan></text>
    </g>
    <g class="line17">
      <text y="284"><tspan class="hu-tag">[HU] </tspan><tspan class="dim">a3f1c02</tspan><tspan class="output">  const limiter = rateLimit({ window: 60, max: 100 });</tspan></text>
    </g>

    <!-- gitintel stats -->
    <g class="line18">
      <text y="316"><tspan class="prompt">$</tspan><tspan class="cmd"> gitintel stats --since 30d</tspan></text>
    </g>
    <g class="line19">
      <text y="336" class="output">AI Adoption Stats</text>
    </g>
    <g class="line20">
      <text y="356">
        <tspan class="output">AI-Generated:   </tspan>
        <tspan class="highlight">████████████████</tspan><tspan class="dim">░░░░░░░░░░░░░░</tspan>
        <tspan class="pct">  43.2%</tspan>
      </text>
    </g>
    <g class="line21">
      <text y="372">
        <tspan class="output">Human-Written:  </tspan>
        <tspan class="stat">██████████████████████</tspan><tspan class="dim">░░░░░░░░</tspan>
        <tspan class="pct">  56.8%</tspan>
      </text>
    </g>
    <g class="line22">
      <text y="392"><tspan class="output">Total Cost:     </tspan><tspan class="stat">$47.23</tspan><tspan class="output">  (142 commits, avg $0.33/commit)</tspan></text>
    </g>
    <g class="line23">
      <text y="420"><tspan class="dim">100% local. Open standard. Works with any AI agent.</tspan></text>
    </g>
  </g>
</svg>
