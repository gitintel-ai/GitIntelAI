# OpenTelemetry Collector Configuration for GitIntel
# Receives Claude Code telemetry and exports to ClickHouse

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  # Batch metrics for efficient export
  batch:
    timeout: 10s
    send_batch_size: 1000

  # Add metadata attributes
  attributes:
    actions:
      - key: service.environment
        value: production
        action: upsert
      - key: gitintel.version
        value: "1.0.0"
        action: upsert

  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # Filter out unwanted metrics
  filter:
    metrics:
      include:
        match_type: regexp
        metric_names:
          - "claude_code.*"
          - "gitintel.*"

exporters:
  # ClickHouse for analytics storage
  clickhouse:
    endpoint: tcp://clickhouse:9000
    database: gitintel_otel
    ttl: 90d  # 90 days retention
    create_schema: true
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  # File exporter for debugging
  file:
    path: /var/log/gitintel/otel.jsonl
    rotation:
      max_megabytes: 100
      max_days: 7
      max_backups: 3

  # Debug logging (disable in production)
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

  pprof:
    endpoint: "0.0.0.0:1777"

  zpages:
    endpoint: "0.0.0.0:55679"

service:
  extensions: [health_check, pprof, zpages]

  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes, filter]
      exporters: [clickhouse, file]

  telemetry:
    logs:
      level: info
    metrics:
      address: "0.0.0.0:8888"
