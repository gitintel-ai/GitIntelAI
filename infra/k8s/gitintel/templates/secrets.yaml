apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gitintel.fullname" . }}-secrets
  labels:
    {{- include "gitintel.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ include "gitintel.databaseUrl" . | quote }}
  redis-url: {{ include "gitintel.redisUrl" . | quote }}
  {{- if and .Values.auth.clerk.secretKey (not .Values.auth.clerk.existingSecret) }}
  clerk-secret-key: {{ .Values.auth.clerk.secretKey | quote }}
  {{- end }}
