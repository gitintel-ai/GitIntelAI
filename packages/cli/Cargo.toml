[package]
name = "gitintel"
version = "0.1.0"
edition = "2021"
authors = ["GitIntel AI Team"]
description = "Git-native AI adoption tracking, cost intelligence & context optimization"
license = "MIT"
repository = "https://github.com/gitintel-ai/gitintel"
readme = "README.md"
keywords = ["git", "ai", "attribution", "cost-tracking", "claude"]
categories = ["development-tools", "command-line-utilities"]

[[bin]]
name = "gitintel"
path = "src/main.rs"

[dependencies]
# CLI
clap = { version = "4.5", features = ["derive", "env", "cargo"] }
clap_complete = "4.5"

# Git
git2 = "0.19"

# Database
rusqlite = { version = "0.32", features = ["bundled", "backup", "functions"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

# Async Runtime
tokio = { version = "1.40", features = ["full"] }

# HTTP (for OTel and sync)
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }

# OpenTelemetry
opentelemetry = { version = "0.26", features = ["metrics"] }
opentelemetry_sdk = { version = "0.26", features = ["metrics", "rt-tokio"] }
opentelemetry-otlp = { version = "0.26", features = ["tonic", "metrics"] }
tonic = "0.12"
prost = "0.13"

# Token counting
tiktoken-rs = "0.6"

# Utilities
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.11", features = ["v4", "serde"] }
thiserror = "2.0"
anyhow = "1.0"
dirs = "5.0"
walkdir = "2.5"
glob = "0.3"
colored = "2.1"
indicatif = "0.17"
dialoguer = "0.11"
regex = "1.11"
lazy_static = "1.5"
once_cell = "1.20"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tempfile = "3.14"
sha2 = "0.10"
hex = "0.4"
toml = "0.8"
semver = "1.0"

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.1"
tempfile = "3.14"
mockall = "0.13"
wiremock = "0.6"
tokio-test = "0.4"

[features]
default = []
enterprise = []

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.dev]
opt-level = 0
debug = true
