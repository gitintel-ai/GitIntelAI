[package]
name = "gitintel"
version = "0.1.0"
edition = "2021"
authors = ["GitIntel AI Team"]
description = "Git-native AI adoption tracking, cost intelligence & context optimization"
license = "MIT"
repository = "https://github.com/gitintel-ai/GitIntelAI"
readme = "README.md"
keywords = ["git", "ai", "attribution", "cost-tracking", "claude"]
categories = ["development-tools", "command-line-utilities"]

[[bin]]
name = "gitintel"
path = "src/main.rs"

[dependencies]
# CLI
clap = { version = "4.5", features = ["derive", "env", "cargo"] }

# Git
git2 = { version = "0.19", features = ["vendored-openssl"] }

# Database
rusqlite = { version = "0.32", features = ["bundled", "backup", "functions"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

# Async Runtime
tokio = { version = "1.40", features = ["rt-multi-thread", "macros", "net", "io-util", "fs"] }

# HTTP
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }

# Token counting
tiktoken-rs = "0.6"

# Utilities
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.11", features = ["v4", "serde"] }
thiserror = "2.0"
anyhow = "1.0"
dirs = "5.0"
walkdir = "2.5"
glob = "0.3"
colored = "2.1"
regex = "1.11"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tempfile = "3.14"
hex = "0.4"
toml = "0.8"

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.1"
tempfile = "3.14"
mockall = "0.13"
wiremock = "0.6"
tokio-test = "0.4"

[features]
default = []
enterprise = []

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.dev]
opt-level = 0
debug = true
